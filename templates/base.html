<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TicTacMaster{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/main.css') }}">
    <style>
        :root {
            --bg: #0a0a0f;
            --surface: #12121a;
            --surface2: #1a1a26;
            --border: #2a2a3d;
            --accent: #7c6af7;
            --accent2: #f76a6a;
            --accent3: #6af7c8;
            --text: #e8e8f0;
            --text-muted: #7a7a99;
            --x-color: #f76a6a;
            --o-color: #6af7c8;
            --gold: #f7c86a;
            --font-display: 'Syne', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --radius: 12px;
            --shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font-body);
            min-height: 100vh;
            line-height: 1.6;
        }
        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: var(--surface); }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 3px; }

        /* Nav */
        nav {
            position: sticky; top: 0; z-index: 100;
            background: rgba(10,10,15,0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: 0 2rem;
        }
        .nav-inner {
            max-width: 1200px; margin: auto;
            display: flex; align-items: center; gap: 2rem;
            height: 64px;
        }
        .nav-logo {
            font-family: var(--font-display);
            font-size: 1.4rem; font-weight: 800;
            color: var(--text);
            text-decoration: none;
            display: flex; align-items: center; gap: 0.5rem;
        }
        .nav-logo span { color: var(--accent); }
        .nav-links { display: flex; gap: 0.5rem; margin-left: auto; align-items: center; }
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            padding: 0.4rem 0.9rem;
            border-radius: 8px;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .nav-link:hover, .nav-link.active {
            color: var(--text);
            background: var(--surface2);
        }
        .nav-avatar {
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-family: var(--font-display);
            font-weight: 800; font-size: 0.85rem;
            color: white;
            cursor: pointer;
        }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
            padding: 0.65rem 1.4rem;
            border-radius: var(--radius);
            font-family: var(--font-body);
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
        }
        .btn-primary {
            background: var(--accent);
            color: white;
            box-shadow: 0 0 20px rgba(124,106,247,0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(124,106,247,0.5);
        }
        .btn-secondary {
            background: var(--surface2);
            color: var(--text);
            border: 1px solid var(--border);
        }
        .btn-secondary:hover { background: var(--border); }
        .btn-danger {
            background: rgba(247,106,106,0.15);
            color: var(--accent2);
            border: 1px solid rgba(247,106,106,0.3);
        }
        .btn-danger:hover { background: rgba(247,106,106,0.25); }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.5rem;
        }

        /* Page wrapper */
        .page { max-width: 1200px; margin: auto; padding: 2rem; }

        /* Stat cards */
        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1.25rem 1.5rem;
        }
        .stat-label { font-size: 0.78rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
        .stat-value { font-family: var(--font-display); font-size: 2rem; font-weight: 800; margin-top: 0.2rem; }

        /* Badge */
        .badge {
            display: inline-flex; align-items: center;
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem; font-weight: 500;
        }
        .badge-win { background: rgba(106,247,200,0.15); color: var(--accent3); }
        .badge-loss { background: rgba(247,106,106,0.15); color: var(--accent2); }
        .badge-draw { background: rgba(124,106,247,0.15); color: var(--accent); }

        /* Alert */
        .alert {
            padding: 0.85rem 1.2rem;
            border-radius: var(--radius);
            font-size: 0.9rem;
            margin-bottom: 1rem;
        }
        .alert-error { background: rgba(247,106,106,0.1); border: 1px solid rgba(247,106,106,0.3); color: var(--accent2); }
        .alert-success { background: rgba(106,247,200,0.1); border: 1px solid rgba(106,247,200,0.3); color: var(--accent3); }

        /* Input */
        .input-group { display: flex; flex-direction: column; gap: 0.4rem; }
        .input-group label { font-size: 0.85rem; color: var(--text-muted); }
        .input-group input, .input-group select {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 0.7rem 1rem;
            font-size: 0.95rem;
            font-family: var(--font-body);
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus, .input-group select:focus {
            border-color: var(--accent);
        }

        /* Grid helpers */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 1rem; }
        .grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 1rem; }

        /* Utility */
        .text-accent { color: var(--accent); }
        .text-muted { color: var(--text-muted); }
        .text-x { color: var(--x-color); }
        .text-o { color: var(--o-color); }
        .mt-1 { margin-top: 0.5rem; }
        .mt-2 { margin-top: 1rem; }
        .mt-3 { margin-top: 1.5rem; }
        .mb-1 { margin-bottom: 0.5rem; }
        .mb-2 { margin-bottom: 1rem; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }
        .gap-1 { gap: 0.5rem; }
        .gap-2 { gap: 1rem; }
        .w-full { width: 100%; }

        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr 1fr; }
            .page { padding: 1rem; }
        }
        @media (max-width: 480px) {
            .grid-2, .grid-3, .grid-4 { grid-template-columns: 1fr; }
        }
    </style>
    {% block head %}{% endblock %}
</head>
<body>
{% if session.get('user_id') %}
<nav>
    <div class="nav-inner">
        <a href="{{ url_for('home') }}" class="nav-logo">
            ✕○ <span>TicTacMaster</span>
        </a>
        <div class="nav-links">
            <a href="{{ url_for('home') }}" class="nav-link {% if request.endpoint=='home' %}active{% endif %}">Home</a>
            <a href="{{ url_for('play') }}" class="nav-link {% if request.endpoint=='play' %}active{% endif %}">Play</a>
            <a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint=='dashboard' %}active{% endif %}">Dashboard</a>
            <a href="{{ url_for('profile') }}" class="nav-link {% if request.endpoint=='profile' %}active{% endif %}">Profile</a>
            <div class="nav-avatar" style="background:{{ session.get('avatar_color','#6c63ff') }}">
                {{ session.get('username','?')[0].upper() }}
            </div>
            <a href="{{ url_for('logout') }}" class="nav-link">Logout</a>
        </div>
    </div>
</nav>
{% endif %}
{% block body %}{% endblock %}
<script src="{{ url_for('static', filename='js/toast.js') }}"></script>
<script>{% block js %}{% endblock %}</script>
</body>
</html>
