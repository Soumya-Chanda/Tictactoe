{% extends 'base.html' %}
{% block title %}Login — TicTacMaster{% endblock %}
{% block head %}
<style>
.auth-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    position: relative;
    overflow: hidden;
}
.auth-bg {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(124,106,247,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(106,247,200,0.08) 0%, transparent 50%);
    pointer-events: none;
}
.grid-pattern {
    position: fixed; inset: 0;
    background-image: 
        linear-gradient(rgba(42,42,61,0.4) 1px, transparent 1px),
        linear-gradient(90deg, rgba(42,42,61,0.4) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
}
.auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    position: relative;
    box-shadow: 0 24px 80px rgba(0,0,0,0.5);
    animation: slideUp 0.5s ease;
}
@keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}
.auth-logo {
    font-family: var(--font-display);
    font-size: 2rem; font-weight: 800;
    text-align: center; margin-bottom: 0.3rem;
}
.auth-sub { text-align: center; color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; }
.auth-form { display: flex; flex-direction: column; gap: 1rem; }
.auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.88rem; color: var(--text-muted); }
.auth-footer a { color: var(--accent); text-decoration: none; }
.brand-grid {
    position: absolute; top: -1px; left: -1px; right: -1px;
    height: 4px;
    background: linear-gradient(90deg, var(--accent), var(--accent3));
    border-radius: 20px 20px 0 0;
}
</style>
{% endblock %}
{% block body %}
<div class="auth-wrap">
    <div class="auth-bg"></div>
    <div class="grid-pattern"></div>
    <div class="auth-box">
        <div class="brand-grid"></div>
        <div class="auth-logo">✕○ <span class="text-accent">TTM</span></div>
        <div class="auth-sub">Welcome back. Sign in to play.</div>

        {% if error %}
        <div class="alert alert-error">{{ error }}</div>
        {% endif %}

        <form class="auth-form" method="POST">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="your_username" required autofocus>
            </div>
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-full" style="margin-top:0.5rem;">
                Sign In →
            </button>
        </form>

        <div class="auth-footer">
            No account? <a href="{{ url_for('register') }}">Create one</a>
        </div>
    </div>
</div>
{% endblock %}
